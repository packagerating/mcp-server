name: Live Smoke Test

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run smoke-test
        env:
          PACKAGERATING_API_KEY: ${{ secrets.PACKAGERATING_API_KEY }}
